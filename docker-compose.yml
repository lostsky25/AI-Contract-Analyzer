services:
  db:
    image: postgres:16-alpine
    container_name: ai-contract-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_contract_analyzer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_contract_analyzer"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-contract-api
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_contract_analyzer
      UPLOAD_DIR: /app/uploads
      CHROMA_DB_DIR: /app/chroma_db
      TESSERACT_CMD: /usr/bin/tesseract
      POPPLER_PATH: ""
    volumes:
      - ./backend:/app
      - model_cache:/root/.cache
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-contract-frontend
    restart: unless-stopped
    env_file:
      - path: ./frontend/.env
        required: false
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  postgres_data:
  model_cache:
  frontend_node_modules:
